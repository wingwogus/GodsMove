name: iOS TestFlight

# dev 브랜치에 push되면 앱을 빌드해 TestFlight에 업로드한다.
# 프로세싱 완료까지 대기하며, 수출 규정(약관 동의)은
# Info-Additions.plist의 ITSAppUsesNonExemptEncryption=false 로 자동 처리된다.
on:
  push:
    branches:
      - dev
    paths:
      - "frontend/**"
      - ".github/workflows/ios-testflight.yml"
  workflow_dispatch: # 필요 시 수동 실행

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: frontend/ChamChamCham

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby & fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: frontend/ChamChamCham

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        env:
          # ── App Store Connect API Key (.p8) ──
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }} # .p8 파일 내용을 base64 인코딩한 값
          # ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}       # 계정이 여러 팀에 속한 경우에만

          # ── fastlane match (인증서/프로파일 private repo) ──
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

          # ── Secrets.swift 재생성용 앱 키 (gitignore 대상이라 CI에 없음) ──
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          JUSO_API_KEY: ${{ secrets.JUSO_API_KEY }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}

          # ── TestFlight 외부 테스터 배포 + Beta App Review 자동 제출 ──
          TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_GROUPS }} # 예: "test" 또는 "test,QA" (콤마 구분)
          TESTFLIGHT_FEEDBACK_EMAIL: ${{ secrets.TESTFLIGHT_FEEDBACK_EMAIL }}
          BETA_REVIEW_CONTACT_EMAIL: ${{ secrets.BETA_REVIEW_CONTACT_EMAIL }}
          BETA_REVIEW_CONTACT_FIRST_NAME: ${{ secrets.BETA_REVIEW_CONTACT_FIRST_NAME }}
          BETA_REVIEW_CONTACT_LAST_NAME: ${{ secrets.BETA_REVIEW_CONTACT_LAST_NAME }}
          BETA_REVIEW_CONTACT_PHONE: ${{ secrets.BETA_REVIEW_CONTACT_PHONE }}

          # 비대화형 실행
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_HIDE_CHANGELOG: "1"
