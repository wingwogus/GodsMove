spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
jwt:
  secret: ${PROD_JWT_SECRET}

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
  mail:
    from-name: ${PROD_MAIL_FROM_NAME:Example}

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: ${KAKAO_NATIVE_APP_KEY}
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600

rag:
  embedding:
    model: ${RAG_EMBEDDING_MODEL:bge-m3}
    dimension: ${RAG_EMBEDDING_DIMENSION:1024}
  chat:
    model: ${RAG_CHAT_MODEL:openclaw/agri-rag-coach}
  retrieval:
    top-k-default: ${RAG_TOP_K_DEFAULT:6}
    top-k-max: ${RAG_TOP_K_MAX:20}
    low-similarity-threshold: ${RAG_LOW_SIMILARITY_THRESHOLD:0.55}
  timeout-millis: ${RAG_TIMEOUT_MILLIS:30000}

ollama:
  base-url: ${OLLAMA_BASE_URL}

openclaw:
  base-url: ${OPENCLAW_BASE_URL}
  api-key: ${OPENCLAW_API_KEY}
  agent-id: ${OPENCLAW_AGENT_ID:agri-rag-coach}
