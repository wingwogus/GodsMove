server:
  port: 8080

spring:
  profiles:
    active: local  # 기본은 local 환경
  jackson:
    time-zone: Asia/Seoul  # 기상청 API가 KST 기준이라 응답 직렬화도 KST로 맞춘다
  cache:
    # 반드시 명시해야 한다. 인증이 spring-boot-starter-data-redis를 쓰는 탓에 클래스패스에
    # Redis가 있고, Spring Boot 자동설정은 Redis를 Caffeine보다 먼저 고른다. 비워두면 캐시가
    # Redis로 가면서 아래 caffeine 설정이 조용히 무시되고, Redis 기본 JDK 직렬화가
    # 기상청 응답 DTO를 NotSerializableException으로 터뜨린다.
    type: caffeine
    cache-names: kma
    caffeine:
      # 캐시 키에 발표시각이 들어가므로 다음 발표는 새 키가 된다. 따라서 TTL은 정확성이 아니라
      # 메모리 회수 문제일 뿐이고, 값 하나가 26시간이면 충분하다 — 당일 최저/최고를 담은 02시
      # 발표를 그날 자정까지 재사용해야 하는 게 가장 긴 요구다.
      spec: expireAfterWrite=26h,maximumSize=10000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId}] [eventId=%X{eventId}] [memberId=%X{memberId}] [ip=%X{clientIp}] %-5level %logger{36} - %msg%n"

policy:
  nongup-ez:
    base-url: https://www.nongupez.go.kr
    timeout-millis: 10000
