spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false
    open-in-view: false

  mail:
    host: localhost
    port: 2525
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000

jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

redis:
  host: localhost
  port: 6379

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  auth:
    refresh-cookie-secure: false
  mail:
    from-name: ChamChamCham
  media:
    max-image-bytes: 10485760

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret
  secure: true

policy:
  nongup-ez:
    base-url: https://www.nongupez.go.kr
    timeout-millis: 10000

weather:
  kma:
    base-url: https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0
    service-key: test-kma-service-key
    connect-timeout-millis: 2000
    read-timeout-millis: 2000

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: test-kakao-native-app-key
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v1/oidc/userinfo}
      connect-timeout-millis: ${KAKAO_CONNECT_TIMEOUT_MILLIS:2000}
      read-timeout-millis: ${KAKAO_READ_TIMEOUT_MILLIS:2000}
  apple:
    oidc:
      issuer: https://appleid.apple.com
      audience: ${APPLE_CLIENT_ID:com.chamchamcham.ios}
      jwks-uri: https://appleid.apple.com/auth/keys
      allowed-clock-skew-seconds: 60
  naver:
    profile-uri: ${NAVER_PROFILE_URI:https://openapi.naver.com/v1/nid/me}
    connect-timeout-millis: ${NAVER_CONNECT_TIMEOUT_MILLIS:2000}
    read-timeout-millis: ${NAVER_READ_TIMEOUT_MILLIS:2000}
