spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5444/chamchamchamdb}
    username: ${SPRING_DATASOURCE_USERNAME:chamchamcham}
    password: ${SPRING_DATASOURCE_PASSWORD:chamchamcham}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:test}
    password: ${MAIL_PASSWORD:test}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
# Base64 인코딩된 dummy key. (실서버에서는 secret을 프로필마다 override)
jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

redis:
  host: localhost
  port: 6379

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
  mail:
    from-name: ${MAIL_FROM_NAME:Example}
  media:
    max-image-bytes: 10485760

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  secure: true

weather:
  kma:
    base-url: https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0
    service-key: ${KMA_SERVICE_KEY:test-kma-service-key}
    connect-timeout-millis: ${KMA_CONNECT_TIMEOUT_MILLIS:2000}
    read-timeout-millis: ${KMA_READ_TIMEOUT_MILLIS:2000}

psis:
  pesticide:
    base-url: ${PSIS_PESTICIDE_BASE_URL:}
    service-key: ${PSIS_PESTICIDE_SERVICE_KEY:}
    timeout-millis: ${PSIS_PESTICIDE_TIMEOUT_MILLIS:10000}

openai:
  realtime:
    api-key: ${OPENAI_API_KEY:test-openai-api-key}
    base-url: https://api.openai.com
    model: gpt-realtime
    voice: marin
    connect-timeout-millis: ${OPENAI_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${OPENAI_READ_TIMEOUT_MILLIS:8000}

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: ${KAKAO_NATIVE_APP_KEY:test-kakao-native-app-key}
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v1/oidc/userinfo}
      connect-timeout-millis: ${KAKAO_CONNECT_TIMEOUT_MILLIS:2000}
      read-timeout-millis: ${KAKAO_READ_TIMEOUT_MILLIS:2000}
  apple:
    oidc:
      issuer: https://appleid.apple.com
      audience: ${APPLE_CLIENT_ID:com.chamchamcham.ios}
      jwks-uri: https://appleid.apple.com/auth/keys
      allowed-clock-skew-seconds: 60
  naver:
    profile-uri: ${NAVER_PROFILE_URI:https://openapi.naver.com/v1/nid/me}
    connect-timeout-millis: ${NAVER_CONNECT_TIMEOUT_MILLIS:2000}
    read-timeout-millis: ${NAVER_READ_TIMEOUT_MILLIS:2000}
