spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
        show_sql: false
    open-in-view: false

  mail:
    host: localhost
    port: 2525
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000

jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

redis:
  host: localhost
  port: 6379

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  auth:
    refresh-cookie-secure: false
  mail:
    from-name: GodsMove

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: test-kakao-native-app-key
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600

rag:
  embedding:
    model: ${RAG_EMBEDDING_MODEL:bge-m3}
    dimension: ${RAG_EMBEDDING_DIMENSION:1024}
  chat:
    model: ${RAG_CHAT_MODEL:openclaw/agri-rag-coach}
  retrieval:
    top-k-default: ${RAG_TOP_K_DEFAULT:6}
    top-k-max: ${RAG_TOP_K_MAX:20}
    low-similarity-threshold: ${RAG_LOW_SIMILARITY_THRESHOLD:0.55}
  timeout-millis: ${RAG_TIMEOUT_MILLIS:30000}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

openclaw:
  base-url: ${OPENCLAW_BASE_URL:http://127.0.0.1:18789}
  api-key: ${OPENCLAW_API_KEY:}
  agent-id: ${OPENCLAW_AGENT_ID:agri-rag-coach}
