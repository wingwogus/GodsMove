<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>음성 기록 E2E 테스트</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 880px; margin: 20px auto; padding: 0 12px; }
  fieldset { margin: 12px 0; border: 1px solid #ccc; border-radius: 6px; }
  legend { font-weight: 600; }
  label { display: inline-block; min-width: 140px; }
  .row { margin: 4px 0; }
  input, select, textarea, button { font-size: 14px; padding: 4px 6px; }
  input[type=text], input[type=email], input[type=password] { width: 280px; }
  button { cursor: pointer; margin-right: 6px; }
  #state { font-weight: 700; padding: 2px 10px; border-radius: 10px; background: #eee; }
  #error { color: #b00020; white-space: pre-wrap; }
  #transcript div { margin: 3px 0; }
  #transcript .USER { color: #0b57d0; }
  #transcript .ASSISTANT { color: #146c2e; }
  #transcript .SYSTEM { color: #888; font-style: italic; }
  #debug { height: 140px; overflow: auto; font: 11px monospace; background: #f6f6f6; padding: 4px; }
  #counters span { margin-right: 16px; font-weight: 600; }
  .warn { color: #b26a00; }
  .hidden { display: none; }
  #limitBanner { display: none; margin: 8px 0; padding: 8px 12px; border-radius: 6px; font-weight: 600; }
  #limitBanner.show { display: block; }
  #limitBanner.stop { background: #fdecea; color: #b00020; border: 1px solid #f5c2c7; }
  #limitBanner.expired { background: #fff4e5; color: #8a5300; border: 1px solid #ffdca8; }
</style>
</head>
<body>
<h2>음성 기록 E2E 테스트 <span id="state">IDLE</span></h2>
<div class="row"><label>API base</label><input type="text" id="baseUrl" value="http://localhost:8080"></div>
<div id="error"></div>

<fieldset><legend>1. 로그인</legend>
  <div class="row"><label>email</label><input type="email" id="email" value="weather-qa@example.com"></div>
  <div class="row"><label>password</label><input type="password" id="password" value="Test1234!"></div>
  <button onclick="login()">로그인</button>
  <span id="loginInfo"></span>
  <p style="font-size:12px;color:#666">계정이 없으면: <code>docker exec ccc-redis redis-cli SET "verified-email:이메일" "true" EX 3600</code> 후
  POST /api/v1/auth/signup → 온보딩(농지·작물 등록)까지 완료된 계정 필요. backend/http/farming-record.http 참고.</p>
</fieldset>

<fieldset><legend>2. 음성 세션</legend>
  <button onclick="createSession()">세션 생성</button>
  <button onclick="cancelSession()">세션 취소</button>
  <div id="sessionInfo"></div>
</fieldset>

<fieldset><legend>3. 대화</legend>
  <div id="counters"><span>라운드 <b id="round">0</b>/<b id="maxRound">-</b></span><span>경과 <b id="elapsed">0</b>s/<b id="maxSec">-</b>s</span><span id="limitNote"></span></div>
  <div id="limitBanner"></div>
  <button onclick="connectRealtime()">연결(마이크 시작)</button>
  <button onclick="finishConversation()">대화 종료 → 턴 제출</button>
  <audio id="remoteAudio" autoplay></audio>
  <div id="transcript"></div>
  <details><summary>raw 이벤트 로그(이벤트명 실측용)</summary><div id="debug"></div></details>
</fieldset>

<fieldset><legend>4. 제출 결과</legend><div id="submitInfo"></div></fieldset>

<fieldset><legend>5. 검토 및 확정</legend>
  <div class="row"><label>농지</label><select id="f_farmId"></select></div>
  <div class="row"><label>작물</label><select id="f_cropId"></select></div>
  <div class="row"><label>작업 유형</label><select id="f_workType" onchange="renderDetail()"></select></div>
  <div class="row"><label>작업 일시</label><input type="datetime-local" id="f_workedAt"></div>
  <div class="row"><label>날씨</label><input type="text" id="f_weatherCondition" style="width:120px"> <input type="number" id="f_weatherTemperature" style="width:70px">℃
    <button onclick="fetchWeather()">날씨 자동 채우기</button></div>
  <div class="row"><label>메모</label><textarea id="f_memo" rows="3" cols="60" oninput="memoCount()"></textarea> <span id="memoLen">0</span>/30~500자</div>
  <div id="detailBox"></div>
  <button onclick="confirmRecord()">confirm (기록 생성)</button>
  <div id="confirmInfo"></div>
</fieldset>

<script>
// ===== 상태 =====
let token = null, session = null, pc = null, dc = null;
let turns = [];               // {role, content}
let functionArgs = null;      // save_farming_record 인자
let userRounds = 0, startedAt = null, timerId = null, softWarned = false, hardStopped = false;
let resolvedPesticide = null; // {id, label}
let intentionalClose = false; // pc.close()를 우리가 직접 호출했는지(하드컷/취소) — 아니면 예기치 않은 만료로 본다
let finishing = false; // finishConversation() 중복 호출 방지(하드컷과 ICE 끊김이 동시에 걸릴 수 있음)

const $ = (id) => document.getElementById(id);
const setState = (s) => { $('state').textContent = s; };
const setError = (e) => { $('error').textContent = e ? ('오류: ' + e) : ''; };
const base = () => $('baseUrl').value.replace(/\/$/, '');

// 대화가 왜/어떻게 끝났는지 사용자에게 눈에 띄게 알려준다(AI의 음성 마무리와 별개로,
// 화면에도 명확한 이유를 남겨야 헷갈리지 않는다).
function showBanner(kind, text) {
  const el = $('limitBanner');
  el.className = 'show ' + kind;
  el.textContent = text;
}
function hideBanner() { $('limitBanner').className = ''; $('limitBanner').textContent = ''; }
function closeIntentionally() { intentionalClose = true; if (pc) pc.close(); }

async function api(method, path, body) {
  setError('');
  const res = await fetch(base() + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  let json = null;
  try { json = await res.json(); } catch (_) {}
  if (!res.ok || (json && json.success === false)) {
    const err = json && json.error ? `${json.error.code}: ${json.error.message}\n${JSON.stringify(json.error.detail ?? '', null, 1)}` : `HTTP ${res.status}`;
    setError(err);
    throw new Error(err);
  }
  return json ? json.data : null;
}

// ===== 1. 로그인 =====
async function login() {
  const data = await api('POST', '/api/v1/auth/login', { email: $('email').value, password: $('password').value });
  token = data.accessToken;
  $('loginInfo').textContent = '로그인 성공';
  setState('LOGGED_IN');
}

// ===== 2. 세션 =====
async function createSession() {
  resetConversation();
  session = await api('POST', '/api/v1/voice-sessions');
  $('maxRound').textContent = session.maxRounds;
  $('maxSec').textContent = session.maxDurationSeconds;
  $('sessionInfo').innerHTML =
    `sessionId=${session.sessionId}<br>model=${session.model}, secret 만료=${session.expiresAt}<br>` +
    `한도: ${session.maxRounds}라운드 / ${session.maxDurationSeconds}초<br>` +
    session.farms.map(f => `농지 ${f.name}: ` + (session.cropsByFarm[f.farmId] || []).map(c => c.name).join(', ')).join('<br>');
  fillSelect($('f_farmId'), session.farms.map(f => [f.farmId, f.name]));
  refreshCropSelect();
  $('f_farmId').onchange = refreshCropSelect;
  fillSelect($('f_workType'), ['PLANTING','WATERING','FERTILIZING','PEST_CONTROL','WEEDING','PRUNING','HARVEST','ETC'].map(w => [w, w]));
  setState('SESSION_CREATED');
}

function refreshCropSelect() {
  const crops = (session && session.cropsByFarm[$('f_farmId').value]) || [];
  fillSelect($('f_cropId'), crops.map(c => [c.cropId, c.name]));
}

async function cancelSession() {
  if (!session) return;
  stopTimer(); closeIntentionally();
  const data = await api('POST', `/api/v1/voice-sessions/${session.sessionId}/cancel`);
  setState(data.status);
}

// ===== 3. WebRTC (iOS WebRTCVoiceTransport와 동일 절차) =====
async function connectRealtime() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  pc = new RTCPeerConnection();
  stream.getTracks().forEach(t => pc.addTrack(t, stream));
  pc.ontrack = (e) => { $('remoteAudio').srcObject = e.streams[0]; };
  pc.oniceconnectionstatechange = () => {
    logDebug({ type: 'ice.' + pc.iceConnectionState });
    if (!intentionalClose && (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed')) {
      showBanner('expired', '🔌 세션이 만료되어 연결이 끊어졌습니다. 지금까지 나눈 대화로 자동 제출합니다.');
      finishConversation();
    }
  };
  dc = pc.createDataChannel('oai-events');
  dc.onopen = () => {
    dc.send(JSON.stringify({ type: 'session.update', session: { type: 'realtime',
      audio: { input: { transcription: { model: 'gpt-4o-mini-transcribe', language: 'ko' } } } } }));
    setState('LISTENING');
    startTimer();
  };
  dc.onmessage = (e) => handleEvent(JSON.parse(e.data));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  const res = await fetch('https://api.openai.com/v1/realtime/calls', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + session.clientSecret, 'Content-Type': 'application/sdp' },
    body: offer.sdp,
  });
  if (!res.ok) { setError('OpenAI 연결 실패 HTTP ' + res.status + ' ' + (await res.text()).slice(0, 300)); return; }
  await pc.setRemoteDescription({ type: 'answer', sdp: await res.text() });
}

function handleEvent(evt) {
  logDebug(evt);
  if (evt.type === 'conversation.item.input_audio_transcription.completed' && evt.transcript) {
    addTurn('USER', evt.transcript.trim());
    userRounds += 1;
    $('round').textContent = userRounds;
    checkLimits();
  } else if (evt.type === 'response.output_audio_transcript.done' && evt.transcript) {
    addTurn('ASSISTANT', evt.transcript.trim());
  } else if (evt.type === 'response.function_call_arguments.done' && evt.name === 'save_farming_record') {
    functionArgs = JSON.parse(evt.arguments);
    addLine('SYSTEM', 'save_farming_record 호출 감지 → 후보 확보. "대화 종료 → 턴 제출"을 누르세요.');
    prefillFromArgs();
  }
}

function addTurn(role, content) { if (content) { turns.push({ role, content }); addLine(role, content); } }
function addLine(cls, text) {
  const d = document.createElement('div'); d.className = cls; d.textContent = `[${cls}] ${text}`;
  $('transcript').appendChild(d);
}
function logDebug(evt) {
  const d = document.createElement('div'); d.textContent = evt.type + (evt.error ? ' ' + JSON.stringify(evt.error) : '');
  $('debug').appendChild(d); $('debug').scrollTop = 1e9;
}

// ===== 한도 강제 =====
function startTimer() {
  startedAt = Date.now();
  timerId = setInterval(() => {
    const sec = Math.floor((Date.now() - startedAt) / 1000);
    $('elapsed').textContent = sec;
    checkLimits(sec);
  }, 1000);
}
function stopTimer() { if (timerId) clearInterval(timerId); timerId = null; }

function checkLimits(sec) {
  if (!session || hardStopped) return;
  sec = sec ?? Math.floor((Date.now() - startedAt) / 1000);
  const nearRounds = userRounds >= session.maxRounds - 2;
  const nearTime = sec >= session.maxDurationSeconds - 60;
  if (!softWarned && (nearRounds || nearTime)) {
    softWarned = true;
    $('limitNote').textContent = '⚠ 한도 임박 — 마무리 지시 주입';
    $('limitNote').className = 'warn';
    if (dc && dc.readyState === 'open') {
      dc.send(JSON.stringify({ type: 'conversation.item.create', item: { type: 'message', role: 'system',
        content: [{ type: 'input_text', text: '시간이 얼마 남지 않았습니다. 새 질문 없이 한두 문장으로 마무리하고, 지금까지 정보로 save_farming_record를 호출하세요.' }] } }));
      dc.send(JSON.stringify({ type: 'response.create' }));
    }
  }
  if (userRounds >= session.maxRounds || sec >= session.maxDurationSeconds) {
    hardStopped = true;
    const reason = userRounds >= session.maxRounds ? `최대 라운드(${session.maxRounds})` : `최대 시간(${session.maxDurationSeconds}초)`;
    addLine('SYSTEM', `${reason} 도달 — 대화를 강제 종료하고 지금까지 내용으로 제출합니다.`);
    showBanner('stop', `⏱ ${reason}에 도달해 대화를 종료했습니다. 지금까지 나눈 내용으로 자동 제출됐으니, 아래 검토 화면에서 부족한 항목을 채워주세요.`);
    finishConversation();
  }
}

// ===== 후보 정제 + 턴 제출 =====
// CandidateRequest는 detail DTO의 @NotNull 하위 필드를 그대로 검증하므로,
// 필수 하위 필드가 빠진 detail 객체는 통째로 생략해야 400이 나지 않는다.
function buildCandidate(a) {
  a = a || {};
  const c = {
    farmId: a.farmId ?? null, cropId: a.cropId ?? null, workType: a.workType ?? null,
    workedAt: a.workedAt ?? null, memo: a.memo ?? null,
  };
  if (a.planting && a.planting.plantingMethod) c.planting = a.planting;
  if (a.watering) c.watering = a.watering;
  if (a.fertilizing && a.fertilizing.materialName && a.fertilizing.amount != null && a.fertilizing.amountUnit) c.fertilizing = a.fertilizing;
  const p = a.pestControl;
  if (p && resolvedPesticide && p.pesticideAmount != null && p.pesticideAmountUnit && p.totalSprayAmount != null && p.totalSprayAmountUnit) {
    c.pestControl = { pesticideId: resolvedPesticide.id, pesticideAmount: p.pesticideAmount, pesticideAmountUnit: p.pesticideAmountUnit,
      totalSprayAmount: p.totalSprayAmount, totalSprayAmountUnit: p.totalSprayAmountUnit };
  }
  if (a.weeding) c.weeding = a.weeding;
  const h = a.harvest;
  if (h && h.growthPeriod != null && h.isLastHarvest != null && (h.harvestAmount != null || h.harvestAmountUnknown === true)) c.harvest = h;
  return c;
}

async function finishConversation() {
  if (finishing) return;
  finishing = true;
  stopTimer(); closeIntentionally();
  if (!turns.length) { setError('제출할 턴이 없습니다'); return; }
  setState('SUBMITTED');
  // 방제 기록인데 농약이 아직 UUID로 해석되지 않았으면 카탈로그에서 자동 검색 시도
  if (functionArgs && functionArgs.pestControl && functionArgs.pestControl.pesticideName && !resolvedPesticide) {
    await searchPesticide(functionArgs.pestControl.pesticideName, true);
  }
  const data = await api('PATCH', `/api/v1/voice-sessions/${session.sessionId}/turns`,
    { turns, candidate: buildCandidate(functionArgs) });
  $('submitInfo').innerHTML = `status=${data.status}<br>누락 필드: <b>${data.missingFields.join(', ') || '없음'}</b>`;
  prefillFromArgs();
  await fetchWeather().catch(() => {});
  setState('REVIEW');
}

// ===== 농약 검색 (이름 → UUID, iOS와 동일하게 클라이언트 책임) =====
async function searchPesticide(keyword, auto) {
  const data = await api('GET', `/api/v1/pesticides?keyword=${encodeURIComponent(keyword)}&size=5`);
  const items = data.items ?? data ?? [];
  if (auto && items.length === 1) { resolvedPesticide = { id: items[0].id, label: items[0].brandName + ' ' + items[0].itemName }; }
  return items;
}

// ===== 5. 검토 폼 =====
function fillSelect(sel, pairs, selected) {
  sel.innerHTML = '<option value="">-</option>' + pairs.map(([v, t]) => `<option value="${v}">${t}</option>`).join('');
  if (selected) sel.value = selected;
}
function memoCount() { $('memoLen').textContent = $('f_memo').value.length; }

const ENUMS = {
  plantingMethod: ['SEED','SEEDLING'], seedAmountUnit: ['G'], seedlingUnit: ['JU'],
  propagationMethod: ['CUTTING','GRAFTING','LAYERING','DIVISION','TISSUE_CULTURE','PURCHASED'],
  irrigationAmount: ['LOW','NORMAL','SUFFICIENT'], irrigationMethod: ['DRIP','SPRAYING','ETC'],
  amountUnit: ['G','ML'], applicationMethod: ['SOIL','FOLIAR'],
  pesticideAmountUnit: ['ML','G'], totalSprayAmountUnit: ['ML'],
  weedingMethod: ['HAND','MACHINE','MULCHING','HERBICIDE'],
  medicinalPart: ['WHOLE_HERB','ROOT_BARK','RHIZOME','LEAF','FLOWER','FRUIT','SEED','STEM_BRANCH','UNKNOWN'],
  harvestSource: ['CULTIVATED','FORAGED'], isLastHarvest: ['true','false'], harvestAmountUnknown: ['false','true'],
};
const DETAILS = {
  PLANTING: { key: 'planting', fields: ['plantingMethod','seedAmount','seedAmountUnit','seedlingCount','seedlingUnit','propagationMethod'] },
  WATERING: { key: 'watering', fields: ['irrigationAmount','irrigationMethod'] },
  FERTILIZING: { key: 'fertilizing', fields: ['materialName','amount','amountUnit','applicationMethod'] },
  PEST_CONTROL: { key: 'pestControl', fields: ['pesticideSearch','pesticideAmount','pesticideAmountUnit','totalSprayAmount','totalSprayAmountUnit'] },
  WEEDING: { key: 'weeding', fields: ['weedingMethod'] },
  HARVEST: { key: 'harvest', fields: ['harvestAmount','harvestAmountUnknown','medicinalPart','harvestSource','growthPeriod','isLastHarvest'] },
};
const NUMBER_FIELDS = new Set(['seedAmount','seedlingCount','amount','pesticideAmount','totalSprayAmount','harvestAmount','growthPeriod']);

function renderDetail(prefill) {
  const spec = DETAILS[$('f_workType').value];
  if (!spec) { $('detailBox').innerHTML = ''; return; }
  $('detailBox').innerHTML = '<b>상세(' + spec.key + ')</b>' + spec.fields.map(f => {
    if (f === 'pesticideSearch') {
      return `<div class="row"><label>농약 검색</label><input type="text" id="d_pesticideKeyword" style="width:160px">
        <button type="button" onclick="uiSearchPesticide()">검색</button><select id="d_pesticideId" style="width:220px"></select></div>`;
    }
    if (ENUMS[f]) return `<div class="row"><label>${f}</label><select id="d_${f}">${['<option value="">-</option>'].concat(ENUMS[f].map(v => `<option>${v}</option>`)).join('')}</select></div>`;
    const type = NUMBER_FIELDS.has(f) ? 'number' : 'text';
    return `<div class="row"><label>${f}</label><input type="${type}" id="d_${f}" step="any" style="width:160px"></div>`;
  }).join('');
  if (prefill) spec.fields.forEach(f => { const el = $('d_' + f); if (el && prefill[f] != null) el.value = String(prefill[f]); });
  if (spec.key === 'pestControl') {
    if (resolvedPesticide) fillSelect($('d_pesticideId'), [[resolvedPesticide.id, resolvedPesticide.label]], resolvedPesticide.id);
    if (prefill && prefill.pesticideName) $('d_pesticideKeyword').value = prefill.pesticideName;
  }
}

async function uiSearchPesticide() {
  const items = await searchPesticide($('d_pesticideKeyword').value, false);
  fillSelect($('d_pesticideId'), items.map(i => [i.id, `${i.brandName} ${i.itemName}`]));
  if (items.length) { $('d_pesticideId').value = items[0].id; }
}

function prefillFromArgs() {
  const a = functionArgs || {};
  if (a.farmId) { $('f_farmId').value = a.farmId; refreshCropSelect(); }
  if (a.cropId) $('f_cropId').value = a.cropId;
  if (a.workType) $('f_workType').value = a.workType;
  $('f_workedAt').value = (a.workedAt || new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString()).slice(0, 16);
  if (a.memo) { $('f_memo').value = a.memo; memoCount(); }
  const spec = DETAILS[a.workType];
  renderDetail(spec ? a[spec.key] : null);
}

async function fetchWeather() {
  const farmId = $('f_farmId').value;
  const data = await api('GET', '/api/v1/weather/home' + (farmId ? `?farmId=${farmId}` : ''));
  $('f_weatherCondition').value = data.condition && data.condition.text || '';
  $('f_weatherTemperature').value = data.temperature ?? '';
}

function detailFromForm() {
  const spec = DETAILS[$('f_workType').value];
  if (!spec) return {};
  const obj = {};
  spec.fields.forEach(f => {
    if (f === 'pesticideSearch') { if ($('d_pesticideId').value) obj.pesticideId = $('d_pesticideId').value; return; }
    const v = $('d_' + f) && $('d_' + f).value;
    if (v === '' || v == null) return;
    obj[f] = NUMBER_FIELDS.has(f) ? Number(v) : (v === 'true' ? true : v === 'false' ? false : v);
  });
  return Object.keys(obj).length ? { [spec.key]: obj } : {};
}

async function confirmRecord() {
  const body = {
    farmId: $('f_farmId').value || null,
    cropId: $('f_cropId').value || null,
    workType: $('f_workType').value || null,
    workedAt: $('f_workedAt').value ? $('f_workedAt').value + ':00' : null,
    weatherCondition: $('f_weatherCondition').value,
    weatherTemperature: $('f_weatherTemperature').value === '' ? null : Number($('f_weatherTemperature').value),
    memo: $('f_memo').value,
    ...detailFromForm(),
  };
  const data = await api('POST', `/api/v1/voice-sessions/${session.sessionId}/confirm`, body);
  $('confirmInfo').innerHTML = `✅ 기록 생성: recordId=${data.recordId}, workType=${data.workType}`;
  setState('CONFIRMED');
}

function resetConversation() {
  turns = []; functionArgs = null; userRounds = 0; softWarned = false; hardStopped = false; resolvedPesticide = null;
  intentionalClose = true; finishing = false;
  stopTimer(); if (pc) { pc.close(); pc = null; }
  intentionalClose = false;
  $('transcript').innerHTML = ''; $('debug').innerHTML = ''; $('round').textContent = '0'; $('elapsed').textContent = '0';
  $('limitNote').textContent = ''; $('submitInfo').textContent = ''; $('confirmInfo').textContent = '';
  hideBanner();
}
</script>
